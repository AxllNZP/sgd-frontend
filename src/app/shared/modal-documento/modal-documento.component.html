<div class="modal-overlay"
     [ngClass]="{ 'closing': isClosing }"
     (click)="cerrarModal()">

  <div class="modal-content"
       [ngClass]="{ 'closing': isClosing }"
       (click)="$event.stopPropagation()">

    <!-- ICONO -->
    <div class="modal-icono-exito">✓</div>

    <!-- TITULO -->
    <h3 class="modal-title">
      Documento registrado
    </h3>

    <!-- MENSAJE -->
    <p class="modal-text">
      Tu documento fue ingresado correctamente a Mesa de Partes.
    </p>

    <!-- NUMERO -->
    <div class="numero-tramite-box">
      <span>N° de trámite</span>
      <strong>{{ numeroTramite }}</strong>
    </div>

    <!-- NOTA -->
    <p class="modal-nota">
      Guarda este número para hacer seguimiento.
    </p>

    <p class="modal-nota" *ngIf="emailConfirmacion">
      Confirmación enviada a
      <strong>{{ emailConfirmacion }}</strong>
    </p>

    <!-- CTA PRINCIPAL -->
    <button
      class="btn-descarga"
      (click)="onDescargar()"
      [disabled]="descargandoCargo">

      <span *ngIf="!descargandoCargo">
        ⬇ Descargar cargo
      </span>

      <span *ngIf="descargandoCargo" class="btn-loading">
        <span class="mini-spinner"></span>
        Descargando...
      </span>

    </button>

    <!-- ACCIONES -->
    <div class="modal-acciones">
      <button class="btn-secundario" (click)="nuevoRegistro()">
        Registrar otro
      </button>

      <button class="btn-primario" (click)="cerrarModal()">
        Cerrar
      </button>
    </div>

  </div>

</div>
