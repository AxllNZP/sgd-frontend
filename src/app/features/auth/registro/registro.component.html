<!-- =============================================================
     registro.component.html — solo ensamblado de sub-componentes
     Cada <app-paso-*> es un componente independiente.
     El padre pasa datos vía [Input] y escucha eventos vía (Output).
     ============================================================= -->

<!-- ── Header ciudadano autenticado ── -->
<header class="header-ciudadano" *ngIf="esCiudadanoAutenticado">
  <span class="header-titulo">
    Sesión: {{ tipoPersonaActual === 'JURIDICA' ? 'Persona Jurídica' : 'Persona Natural' }}
    &nbsp;·&nbsp;
    <strong style="color:#94a3b8">{{ form.remitente || 'Ciudadano' }}</strong>
  </span>
  <div class="header-acciones">
    <a routerLink="/ciudadano/mis-datos" class="header-btn">
      <svg width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z
                 M4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0
                 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
      </svg>
      Mis Datos
    </a>
    <button class="header-logout" (click)="cerrarSesion()">
      <svg width="14" height="14" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2"
           style="display:inline;vertical-align:middle;margin-right:4px">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25
                 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25
                 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/>
      </svg>
      Cerrar sesión
    </button>
  </div>
</header>

<!-- ════════════════════════════════════════════════════════
     ETAPA 1 — Formulario
════════════════════════════════════════════════════════ -->
<div class="registro-container" *ngIf="etapa === 1">

  <h2 class="titulo">Registrar Documento</h2>

  <div class="etapas-indicador">
    <span class="etapa-activa">1. Datos del documento</span>
    <span class="separador"> › </span>
    <span class="etapa-inactiva">2. Confirmación</span>
  </div>

  <div class="error-msg" *ngIf="error">{{ error }}</div>

  <!--
    Paso 1: Datos del remitente
    form se pasa por referencia — ngModel del hijo muta el objeto directamente
  -->
  <app-paso-remitente
    [form]="form"
    [tipoPersona]="tipoPersona"
    [esCiudadanoAutenticado]="esCiudadanoAutenticado">
  </app-paso-remitente>

  <!-- Paso 2: Tipo de documento, asunto, folios -->
  <app-paso-documento [form]="form">
  </app-paso-documento>

  <!--
    Paso 3: Archivos adjuntos
    Los archivos no son parte de RegistroForm — el hijo los valida
    y emite los File al padre para armarlos en el FormData
  -->
  <app-paso-adjuntos
    [archivoNombre]="archivoNombre"
    [anexoNombre]="anexoNombre"
    (archivoSeleccionado)="onArchivoSeleccionado($event)"
    (anexoSeleccionado)="onAnexoSeleccionado($event)">
  </app-paso-adjuntos>

  <div class="acciones">
    <button class="btn-primario" (click)="continuar()">
      Continuar →
    </button>
  </div>

</div>

<!-- ════════════════════════════════════════════════════════
     ETAPA 2 — Confirmación (componente completo)
     El hijo emite (confirmar) y (cancelar) al padre
════════════════════════════════════════════════════════ -->
<app-paso-confirmacion
  *ngIf="etapa === 2"
  [form]="form"
  [archivoNombre]="archivoNombre"
  [anexoNombre]="anexoNombre"
  [cargando]="cargando"
  [error]="error"
  (confirmar)="confirmarEnvio()"
  (cancelar)="cancelar()">
</app-paso-confirmacion>

<!-- ════════════════════════════════════════════════════════
     MODAL DE ÉXITO — componente compartido en /shared
════════════════════════════════════════════════════════ -->
<app-modal-documento
  *ngIf="mostrarModal"
  [numeroTramite]="numeroTramite"
  [emailConfirmacion]="emailConfirmacion"
  [descargandoCargo]="descargandoCargo"
  (cerrar)="cerrarModal()"
  (nuevo)="nuevoRegistro()"
  (descargar)="descargarCargo()">
</app-modal-documento>
