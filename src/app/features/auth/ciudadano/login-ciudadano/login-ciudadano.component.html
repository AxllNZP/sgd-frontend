<div class="login-bg">

  <!-- PARTICLES -->
  <div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>


  <div class="login-card">

    <!-- HEADER -->
    <div class="login-header">

      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0
               3.75 3.75 0 017.5 0z
               M4.501 20.118a7.5 7.5 0
               0114.998 0A17.933 17.933 0
               0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
        </svg>
      </div>

      <h1>
        Acceso <span class="accent">Ciudadano</span>
      </h1>

      <p>Ingrese sus credenciales para continuar</p>

    </div>


    <!-- ALERTA ERROR -->
    <div class="alert-error" *ngIf="errorMsg">

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path stroke-linecap="round" d="M12 8v4m0 4h.01"/>
      </svg>

      {{ errorMsg }}

    </div>


    <!-- FORM -->
    <form (ngSubmit)="login()" #loginForm="ngForm" novalidate>


      <!-- TIPO PERSONA -->
      <div class="field-group">

        <label>Tipo de persona</label>

        <div class="toggle-tipo">

          <button
            type="button"
            (click)="form.tipoPersna = 'NATURAL'"
            [class.active]="form.tipoPersna === 'NATURAL'">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15.75 6a3.75 3.75 0
                   11-7.5 0 3.75 3.75 0
                   017.5 0zM4.501 20.118a7.5 7.5 0
                   0114.998 0A17.933 17.933 0
                   0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>

            Natural

          </button>


          <button
            type="button"
            (click)="form.tipoPersna = 'JURIDICA'"
            [class.active]="form.tipoPersna === 'JURIDICA'">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M3.75 21h16.5M4.5 3h15
                   M5.25 3v18m13.5-18v18
                   M9 6.75h1.5m-1.5 3h1.5
                   m-1.5 3h1.5m3-6H15
                   m-1.5 3H15m-1.5 3H15
                   M9 21v-3.375c0-.621.504-1.125
                   1.125-1.125h3.75c.621 0
                   1.125.504 1.125 1.125V21"/>
            </svg>

            Jurídica

          </button>

        </div>

      </div>



      <!-- IDENTIFICADOR -->
      <div class="field-group">

        <label for="identificador">
          {{ form.tipoPersna === 'NATURAL'
              ? 'DNI / Carné de Extranjería'
              : 'RUC' }}
        </label>

        <div class="input-wrap">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 9h3.75M15 12h3.75
                 M15 15h3.75M4.5 19.5h15
                 a2.25 2.25 0 002.25-2.25V6.75
                 A2.25 2.25 0 0019.5 4.5h-15
                 a2.25 2.25 0 00-2.25 2.25v10.5
                 A2.25 2.25 0 004.5 19.5zm6-10.125
                 a1.875 1.875 0 11-3.75 0
                 1.875 1.875 0 013.75 0zm1.294
                 6.336a6.721 6.721 0
                 01-3.17.789 6.721 6.721 0
                 01-3.168-.789 3.376 3.376 0
                 016.338 0z"/>
          </svg>

          <input
            id="identificador"
            type="text"
            name="identificador"
            [(ngModel)]="form.identificador"
            required
            autocomplete="off"
            appSoloNumeros
            appTrimInput
            [maxlength]="form.tipoPersna === 'NATURAL' ? 8 : 11"
            [placeholder]="form.tipoPersna === 'NATURAL' ? 'Ej: 12345678' : 'Ej: 20123456789'"
          />

        </div>

      </div>



      <!-- PASSWORD -->
      <div class="field-group">

        <label for="password">Contraseña</label>

        <div class="input-wrap">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M16.5 10.5V6.75a4.5 4.5 0
                 10-9 0v3.75m-.75 11.25h10.5
                 a2.25 2.25 0 002.25-2.25v-6.75
                 a2.25 2.25 0 00-2.25-2.25H6.75
                 a2.25 2.25 0 00-2.25 2.25v6.75
                 a2.25 2.25 0 002.25 2.25z"/>
          </svg>

          <input
            id="password"
            name="password"
            [(ngModel)]="form.password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Mínimo 8 caracteres"
            required
            autocomplete="current-password"
          />

          <!-- TOGGLE PASSWORD -->
          <button
            type="button"
            class="toggle-pw"
            (click)="showPassword = !showPassword">

            <!-- ICONOS -->

            <svg
              *ngIf="!showPassword"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5">

              <path stroke-linecap="round" stroke-linejoin="round"
                d="M2.036 12.322a1.012 1.012 0
                   010-.639C3.423 7.51 7.36
                   4.5 12 4.5c4.638 0 8.573
                   3.007 9.963 7.178.07.207
                   .07.431 0 .639C20.577
                   16.49 16.64 19.5 12
                   19.5c-4.638 0-8.573
                   -3.007-9.963-7.178z"/>

              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15 12a3 3 0 11-6 0
                   3 3 0 016 0z"/>

            </svg>

            <svg
              *ngIf="showPassword"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5">

              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3.98 8.223A10.477 10.477 0
                   001.934 12C3.226 16.338
                   7.244 19.5 12 19.5
                   c.993 0 1.953-.138
                   2.863-.395"/>

              <path stroke-linecap="round" stroke-linejoin="round"
                d="M6.228 6.228A10.45 10.45 0
                   0112 4.5c4.756 0 8.773
                   3.162 10.065 7.498"/>

            </svg>

          </button>

        </div>

      </div>



      <!-- FORGOT PASSWORD -->
      <div class="forgot-wrap">
        <a routerLink="/ciudadano/recuperar" class="forgot-link">
          ¿Olvidó su contraseña?
        </a>
      </div>



      <!-- SUBMIT -->
      <button
        type="submit"
        class="btn-submit"
        [disabled]="loading">

        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading" class="spinner"></span>

      </button>

    </form>



    <!-- FOOTER -->
    <div class="login-footer">
  <p>¿No tiene cuenta? <a href="/register">Registrarse</a></p>

  <a href="/admin-login" class="admin-link">
    ← Acceso administrador
  </a>
</div>

  </div>

</div>
