<div class="seleccion-bg">
  <div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="seleccion-card">

    <div class="seleccion-header">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0
            00-4.682-2.72m.94 3.198l.001.031c0
            .225-.012.447-.037.666A11.944 11.944
            0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062
            6.062 0 016 18.719m12 0a5.971 5.971 0
            00-.941-3.197m0 0A5.995 5.995 0
            0017.946 15h-1.053A2.25 2.25 0
            0014.25 12.75v-.633c0-.573.11-1.14.322-1.672l.336-.84a2.25
            2.25 0 00-.178-2.165 3.75 3.75 0
            00-6.46 0 2.25 2.25 0 00-.178 2.165l.337.84c.21.532.321
            1.1.321 1.672v.633c0 .739-.36 1.395-.913
            1.799A5.975 5.975 0 006 18.719"/>
        </svg>
      </div>
      <h1>Mesa de Partes <span class="accent">Virtual</span></h1>
      <p>Seleccione el tipo de persona para continuar</p>
    </div>

    <div class="opciones-grid">

      <!-- PERSONA NATURAL -->
      <button class="opcion-card" (click)="elegir('natural')">
        <div class="opcion-icon natural">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75
              0 017.5 0zM4.501 20.118a7.5 7.5 0
              0114.998 0A17.933 17.933 0 0112
              21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
          </svg>
        </div>
        <h2>Persona Natural</h2>
        <p>Ciudadano con DNI o Carnet de Extranjería</p>
        <span class="opcion-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
          </svg>
        </span>
      </button>

      <!-- PERSONA JURÍDICA -->
      <button class="opcion-card" (click)="elegir('juridica')">
        <div class="opcion-icon juridica">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3.75 21h16.5M4.5 3h15M5.25 3v18m13.5-18v18M9
              6.75h1.5m-1.5 3h1.5m-1.5 3h1.5m3-6H15m-1.5 3H15m-1.5
              3H15M9 21v-3.375c0-.621.504-1.125
              1.125-1.125h3.75c.621 0 1.125.504
              1.125 1.125V21"/>
          </svg>
        </div>
        <h2>Persona Jurídica</h2>
        <p>Empresa o entidad con RUC</p>
        <span class="opcion-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
          </svg>
        </span>
      </button>

    </div>

    <div class="seleccion-footer">
      <a routerLink="/ciudadano/login" class="btn-login-link">
        ¿Ya tiene cuenta? Ingresar
      </a>
      <a routerLink="/login" class="btn-staff-link">
        Acceso personal interno
      </a>
    </div>

  </div>
</div>
