<div class="activar-wrapper">
  <div class="activar-card">

    <h2 class="titulo">
      Activar <span>Cuenta</span>
    </h2>

    <p class="subtitulo">
      {{ etapa === 1 ? 'Ingrese sus datos para recibir el código de activación' : 'Ingrese el código enviado a su correo' }}
    </p>

    <!-- ERROR -->
    <div *ngIf="errorMsg" class="alert error">
      {{ errorMsg }}
    </div>

    <!-- ÉXITO -->
    <div *ngIf="successMsg" class="alert success">
      {{ successMsg }}
    </div>


    <!-- ══ ETAPA 1: Datos ══ -->
    <div *ngIf="etapa === 1">

      <!-- Tipo de persona -->
      <div class="form-group">
        <label>Tipo de persona</label>

        <div class="tipo-grid">

          <button
            type="button"
            (click)="form.tipoPersna = 'NATURAL'"
            class="tipo-btn"
            [class.active]="form.tipoPersna === 'NATURAL'">
            Natural
          </button>

          <button
            type="button"
            (click)="form.tipoPersna = 'JURIDICA'"
            class="tipo-btn"
            [class.active]="form.tipoPersna === 'JURIDICA'">
            Jurídica
          </button>

        </div>
      </div>


      <!-- Identificador -->
      <div class="form-group">
        <label>
          {{ form.tipoPersna === 'NATURAL' ? 'Número de documento (DNI)' : 'RUC' }}
        </label>

        <input
          type="text"
          [(ngModel)]="form.identificador"
          [placeholder]="form.tipoPersna === 'NATURAL' ? 'Ej: 12345678' : 'Ej: 20123456789'"
          (keyup.enter)="enviarCodigo()"
          class="input"
        />
      </div>


      <!-- Botón enviar -->
      <button
        (click)="enviarCodigo()"
        [disabled]="loading"
        class="btn-principal">

        {{ loading ? 'Enviando...' : 'Enviar código de activación' }}

      </button>

    </div>



    <!-- ══ ETAPA 2: Código ══ -->
    <div *ngIf="etapa === 2">

      <div class="form-group">
        <label>Código de 6 dígitos</label>

        <input
          type="text"
          [(ngModel)]="codigo"
          placeholder="Ej: 123456"
          maxlength="6"
          (keyup.enter)="verificar()"
          class="input codigo-input"
        />
      </div>


      <button
        (click)="verificar()"
        [disabled]="loading"
        class="btn-principal">

        {{ loading ? 'Verificando...' : 'Activar cuenta' }}

      </button>


      <!-- Reenviar -->
      <div class="reenviar">

        <span>¿No recibió el código?</span>

        <button
          type="button"
          (click)="reenviarCodigo()"
          [disabled]="reenvioDisabled"
          class="reenviar-btn">

          {{ reenvioDisabled ? 'Reenviar en ' + countdown + 's' : 'Reenviar código' }}

        </button>

      </div>


      <!-- Volver -->
      <div class="volver">

        <button
          type="button"
          (click)="volver()"
          class="volver-btn">

          ← Corregir mis datos

        </button>

      </div>

    </div>


    <!-- Footer -->
    <div class="footer">

      <a routerLink="/ciudadano/login">
        ← Volver al inicio de sesión
      </a>

    </div>

  </div>
</div>
