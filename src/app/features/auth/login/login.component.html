<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <i class="fas fa-file-alt login-icon"></i>
      <h2>SMP - SGD</h2>
      <p>Sistema de Mesa de Partes</p>
    </div>

    <div class="login-form">
      <div class="field">
        <label>Email</label>
        <input pInputText
          type="email"
          [(ngModel)]="email"
          placeholder="correo@ejemplo.com"
          class="w-full"/>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input pInputText
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          class="w-full"
          (keyup.enter)="login()"/>
      </div>

      <div class="error-msg" *ngIf="error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>

      <button pButton
        label="Ingresar"
        icon="fas fa-sign-in-alt"
        class="w-full p-button-primary"
        [loading]="cargando"
        (click)="login()">
      </button>

      <div class="register-link">
        <a routerLink="/registro-documento">
          ¿Desea registrar un documento? Click aquí
        </a>
      </div>
    </div>

  </div>
</div>
