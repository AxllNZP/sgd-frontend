<div class="login-bg">
  <div class="particles">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="login-card">

    <div class="login-header">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125
            1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0
            12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621
            0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125
            1.125 1.125h12.75c.621 0 1.125-.504
            1.125-1.125V11.25a9 9 0 00-9-9z"/>
        </svg>
      </div>
      <h1>SMP <span class="accent">·</span> SGD</h1>
      <p>Sistema de Mesa de Partes Virtual</p>
    </div>

    <div class="login-form">

      <div class="field-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21.75 6.75v10.5a2.25 2.25 0
              01-2.25 2.25h-15a2.25 2.25 0
              01-2.25-2.25V6.75m19.5
              0A2.25 2.25 0 0019.5
              4.5h-15a2.25 2.25 0
              00-2.25 2.25m19.5 0v.243a2.25
              2.25 0 01-1.07 1.916l-7.5
              4.615a2.25 2.25 0
              01-2.36 0L3.32 8.91a2.25
              2.25 0 01-1.07-1.916V6.75"/>
          </svg>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            placeholder="correo@institución.gob.pe"
            (keyup.enter)="login()"
            autocomplete="email"/>
        </div>
      </div>

      <div class="field-group">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M16.5 10.5V6.75a4.5 4.5 0
              10-9 0v3.75m-.75 11.25h10.5a2.25
              2.25 0 002.25-2.25v-6.75a2.25
              2.25 0 00-2.25-2.25H6.75a2.25
              2.25 0 00-2.25 2.25v6.75a2.25
              2.25 0 002.25 2.25z"/>
          </svg>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            placeholder="••••••••••"
            (keyup.enter)="login()"
            autocomplete="current-password"/>
        </div>
      </div>

      <div class="error-box" *ngIf="error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ error }}
      </div>

      <button class="btn-login" (click)="login()" [disabled]="cargando">
        <span *ngIf="!cargando">Ingresar al sistema</span>
        <span *ngIf="cargando" class="loading-dots">
          <i></i><i></i><i></i>
        </span>
      </button>

      <div class="divider">
        <span>¿Ciudadano?</span>
      </div>

      <a routerLink="/registro-documento" class="btn-registro">
        Registrar un documento
      </a>

    </div>
  </div>
</div>
