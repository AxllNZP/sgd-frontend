<div class="modal" *ngIf="visible">
  <div class="modal-header">
    <span>Cambiar Estado</span>
    <button class="modal-close" (click)="onCerrar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="modal-body">
    <div class="mfield">
      <label>Nuevo Estado</label>
      <div class="input-wrap select-wrap">
        <select [(ngModel)]="cambioEstado.estado">
          <option *ngFor="let e of estados" [value]="e.value">{{ e.label }}</option>
        </select>
      </div>
    </div>

    <div class="mfield">
      <label>Observación</label>
      <textarea [(ngModel)]="cambioEstado.observacion"
        rows="3"
        placeholder="Ingrese una observación...">
      </textarea>
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn-modal secondary" (click)="onCerrar()">Cancelar</button>
    <button class="btn-modal primary" (click)="onGuardar()">Guardar</button>
  </div>
</div>
