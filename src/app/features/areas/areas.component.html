<div class="lista-bg">

  <!-- ===== TOPBAR ===== -->
  <div class="topbar">
    <button class="btn-back" (click)="volver()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
      </svg>
      Volver
    </button>

    <div class="topbar-info">
      <h1>Gestión de Áreas</h1>
      <span class="doc-count">
        {{ areas.length }} área(s) registrada(s)
      </span>
    </div>

    <div class="topbar-actions">
      <button class="btn-primary" (click)="abrirDialog()">
        Nueva Área
      </button>
    </div>
  </div>

  <!-- ===== CARD CONTENIDO ===== -->
  <div class="card">

    <!-- LOADING -->
    <div class="loading-wrap" *ngIf="cargando">
      <div class="spinner"></div>
      <span>Cargando áreas...</span>
    </div>

    <!-- VACÍO -->
    <div class="empty-wrap" *ngIf="!cargando && areas.length === 0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 7h18M3 12h18M3 17h18"/>
      </svg>
      <p>No hay áreas registradas</p>
    </div>

    <!-- GRID -->
    <div class="areas-grid" *ngIf="!cargando && areas.length > 0">
      <div class="area-card" *ngFor="let area of areas">

        <div class="area-card-header">
          <h3>{{ area.nombre }}</h3>
          <span [class]="'estado-badge ' + getEstadoClass(area.activa)">
            {{ area.activa ? 'Activa' : 'Inactiva' }}
          </span>
        </div>

        <p class="area-description">
          {{ area.descripcion || 'Sin descripción registrada' }}
        </p>

        <div class="area-card-footer">
          <button class="btn-danger"
            (click)="desactivar(area.id)"
            [disabled]="!area.activa">
            Desactivar
          </button>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- ===== DIALOG ===== -->
<div class="dialog-overlay" *ngIf="mostrarDialog">
  <div class="dialog-card">

    <h2>Nueva Área</h2>

    <div class="field">
      <label>Nombre del Área *</label>
      <input type="text"
        [(ngModel)]="nuevaArea.nombre"
        placeholder="Ej: Secretaría General">
    </div>

    <div class="field">
      <label>Descripción</label>
      <textarea rows="3"
        [(ngModel)]="nuevaArea.descripcion"
        placeholder="Descripción del área...">
      </textarea>
    </div>

    <div class="error-msg" *ngIf="error">
      {{ error }}
    </div>

    <div class="dialog-actions">
      <button class="btn-limpiar"
        (click)="mostrarDialog = false">
        Cancelar
      </button>
      <button class="btn-primary"
        (click)="crear()">
        Crear Área
      </button>
    </div>

  </div>
</div>
